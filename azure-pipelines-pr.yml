pr:
  branches:
    include:
      - Dev

trigger: none

pool:
  vmImage: ubuntu-latest

steps:

- checkout: self
  fetchDepth: 0

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install Dependencies'

- task: SonarCloudPrepare@4
  inputs:
    SonarQube: 'Sonar-sc'
    organization: 'ecommerce256'
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: 'ecommerce256_ecommerce256'
    cliProjectName: 'ecommerce256'
    cliSources: '.'

- task: SonarCloudAnalyze@4

- task: SonarCloudPublish@4
  inputs:
    pollingTimeoutSec: '300'