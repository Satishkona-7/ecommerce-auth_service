metadata:
  name: auth-service-prod
  namespace: prod

spec:
  replicas: 3

  template:
    spec:
      containers:
      - name: auth-service

        image: IMAGE_PLACEHOLDER

        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"

          limits:
            cpu: "2"
            memory: "2Gi"