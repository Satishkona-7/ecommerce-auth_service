apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service-dev
  namespace: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service

        image: IMAGE_PLACEHOLDER

        ports:
        - containerPort: 8003

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"