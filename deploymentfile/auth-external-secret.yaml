apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: auth-secret
  namespace: ecommerce

spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-kv-dev

  target:
    name: auth-secret
    creationPolicy: Owner

  dataFrom:
    - find:
        name:
          regexp: "^AUTH-.*"

      rewrite:
        - regexp:
            source: "^AUTH-(.*)"
            target: "$1"