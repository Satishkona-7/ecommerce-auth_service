apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce
spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service
        image: flipkart.azurecr.io/auth-service:v2

        ports:
        - containerPort: 8003

        envFrom:
        - configMapRef:
            name: auth-config

        - secretRef:
            name: auth-secret