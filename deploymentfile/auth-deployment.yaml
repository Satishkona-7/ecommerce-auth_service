apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service
        image: IMAGE_PLACEHOLDER

        ports:
        - containerPort: 8003

        envFrom:
        - secretRef:
            name: auth-secret