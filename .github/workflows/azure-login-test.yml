name: Azure Login Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Resources
        run: |
          az account show
      
          echo "===== ACR ====="
          az acr show --name ecommerce7
      
          echo "===== AKS ====="
          az aks show \
            --resource-group main \
            --name test
      
          echo "===== KEYVAULT ====="
          az keyvault show \
            --name ecommerce7
